<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>比赛场 — 温州麻将</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --gold-glow:      rgba(212,175,55,0.22);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg:       rgba(0,0,0,0.42);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --radius-sm:   6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
      --radius-full: 9999px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:   120ms;
      --duration-normal: 220ms;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--ink);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(var(--safe-bottom) + 90px);
    }
    .header {
      position: sticky; top: 0; z-index: 50;
      padding: var(--radius-md) var(--radius-lg) calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      padding-top: calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid rgba(212,175,55,0.20);
      display: flex; align-items: center; justify-content: space-between; gap: var(--radius-md);
    }
    .header-back { color: var(--ink-muted); text-decoration: none; font-size: 0.82rem; padding: var(--radius-sm); }
    .header-title { font-family: 'Noto Serif SC', Georgia, serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; }
    .header-right { width: 44px; }
    .page { padding: var(--radius-lg); max-width: 480px; margin: 0 auto; }
    .page-title { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
    .page-sub { font-size: 0.78rem; color: var(--ink-muted); margin-bottom: var(--radius-xl); }
    .section-title { font-size: 0.72rem; font-weight: 700; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.10em; margin-bottom: var(--radius-md); display: flex; align-items: center; gap: var(--radius-sm); }
    .section-title::before { content: ''; display: block; width: 3px; height: 1em; background: var(--gold); border-radius: 2px; }
    .tournament-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--radius-lg);
      margin-bottom: var(--radius-md);
      cursor: pointer;
      transition: border-color var(--duration-fast), transform var(--duration-fast) var(--ease-out);
      position: relative; overflow: hidden;
    }
    .tournament-card:active { transform: scale(0.98); }
    .tournament-card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: radial-gradient(circle at top right, rgba(212,175,55,0.08), transparent 70%); pointer-events: none; }
    .tournament-card__header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--radius-md); }
    .tournament-card__name { font-family: 'Noto Serif SC', serif; font-size: 1.05rem; font-weight: 700; color: var(--ink); }
    .tournament-card__badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--radius-full); font-size: 0.68rem; font-weight: 600; }
    .badge--live { background: rgba(220,50,50,0.20); color: #ff8888; border: 1px solid rgba(220,50,50,0.30); }
    .badge--upcoming { background: rgba(212,175,55,0.18); color: var(--gold); border: 1px solid rgba(212,175,55,0.30); }
    .badge--ended { background: rgba(255,255,255,0.06); color: var(--ink-faint); border: 1px solid rgba(255,255,255,0.10); }
    .tournament-card__meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--radius-sm); margin-bottom: var(--radius-md); }
    .meta-item { text-align: center; }
    .meta-item__value { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .meta-item__label { font-size: 0.62rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .tournament-card__footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.07); padding-top: var(--radius-md); }
    .tournament-card__prize { font-size: 0.78rem; color: var(--ink-muted); }
    .tournament-card__prize strong { color: var(--gold); font-weight: 700; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 18px; border-radius: var(--radius-md); font-size: 0.82rem; font-weight: 700; font-family: inherit; cursor: pointer; border: 1.5px solid transparent; transition: all var(--duration-fast) var(--ease-out); white-space: nowrap; }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, rgba(212,175,55,0.85), rgba(212,175,55,0.70)); border-color: var(--gold); color: var(--bg-base); }
    .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, var(--gold), var(--gold-light)); }
    .btn-secondary { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); color: var(--ink-muted); }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.28); color: var(--ink); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--radius-xl) var(--radius-lg); text-align: center; gap: var(--radius-md); }
    .empty-state__icon { font-size: 3rem; opacity: 0.4; }
    .empty-state__title { font-family: 'Noto Serif SC', serif; font-size: 1rem; color: var(--ink-muted); }
    .empty-state__sub { font-size: 0.80rem; color: var(--ink-faint); max-width: 200px; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: var(--radius-md); color: var(--ink-muted); font-size: 0.85rem; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.80); backdrop-filter: blur(8px); color: var(--ink); padding: 10px 22px; border-radius: 9999px; font-size: 0.82rem; z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(255,255,255,0.10); animation: toastIn 0.25s var(--ease-out) both; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-8px); } }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-around;
      padding: var(--radius-sm) env(safe-area-inset-bottom, var(--radius-sm));
      padding-bottom: calc(var(--radius-sm) + env(safe-area-inset-bottom, 0px));
      background: rgba(0,0,0,0.50); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid rgba(212,175,55,0.25);
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: var(--radius-sm) var(--radius-md); border-radius: var(--radius-md); cursor: pointer; transition: background var(--duration-fast), transform var(--duration-fast); min-width: 60px; -webkit-tap-highlight-color: transparent; }
    .tab-item:active { transform: scale(0.90); background: rgba(255,255,255,0.06); }
    .tab-item--active .tab-icon { transform: translateY(-2px); }
    .tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; transition: transform var(--duration-normal) var(--ease-spring); }
    .tab-icon svg { width: 100%; height: 100%; }
    .tab-label { font-size: 0.62rem; font-weight: 500; color: var(--ink-muted); transition: color var(--duration-fast); letter-spacing: 0.02em; }
    .tab-item--active .tab-label { color: var(--gold); font-weight: 600; }
    .nav-info { display: flex; align-items: center; justify-content: center; gap: var(--radius-sm); background: rgba(0,0,0,0.30); backdrop-filter: blur(8px); border: 1px solid rgba(212,175,55,0.15); border-radius: var(--radius-full); padding: var(--radius-sm) var(--radius-md); margin-bottom: var(--radius-xl); }
    .nav-info span { font-size: 0.72rem; color: var(--ink-muted); }
    .nav-info strong { color: var(--gold); font-weight: 700; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="header">
    <a class="header-back" href="index.html">← 大厅</a>
    <span class="header-title">比赛场</span>
    <div class="header-right"></div>
  </header>

  <div class="page">
    <div class="page-title">赛事中心</div>
    <div class="page-sub">参与比赛，赢取丰厚奖励</div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>加载赛事中…</span>
    </div>

    <div id="content" class="hidden">
      <div class="section-title">🏆 正在进行</div>
      <div id="live-list"></div>

      <div class="section-title" style="margin-top: var(--radius-xl);">📅 即将开始</div>
      <div id="upcoming-list"></div>

      <div class="section-title" style="margin-top: var(--radius-xl);">✅ 已结束</div>
      <div id="ended-list"></div>
    </div>

    <div id="empty" class="empty-state hidden">
      <div class="empty-state__icon">🏆</div>
      <div class="empty-state__title">暂无赛事</div>
      <div class="empty-state__sub">敬请期待，更多赛事即将开启</div>
    </div>
  </div>

  <nav class="tab-bar" aria-label="主导航">
    <div class="tab-item" onclick="location.href='index.html'" role="tab" aria-label="大厅">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <span class="tab-label">大厅</span>
    </div>
    <div class="tab-item" onclick="location.href='records.html'" role="tab" aria-label="战绩">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      <span class="tab-label">战绩</span>
    </div>
    <div class="tab-item tab-item--active" role="tab" aria-label="比赛场">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 000-5C17 4 17 7 17 7"/><path d="M4 22h16"/><path d="M10 22V9"/><path d="M14 22V9"/><path d="M8 9h8a2 2 0 010 4H8a2 2 0 010-4z"/></svg></div>
      <span class="tab-label">比赛场</span>
    </div>
    <div class="tab-item" onclick="location.href='leaderboard.html'" role="tab" aria-label="排行榜">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <span class="tab-label">排行</span>
    </div>
    <div class="tab-item" onclick="location.href='profile.html'" role="tab" aria-label="我的">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <span class="tab-label">我的</span>
    </div>
  </nav>

  <script>
    const API = '/api';
    const playerId = localStorage.getItem('mahjong_player');

    function toast(msg) {
      const old = document.getElementById('toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 2200);
    }

    async function load() {
      try {
        const res = await fetch(API + '/tournaments');
        if (!res.ok) throw new Error('加载失败');
        const data = await res.json();
        render(data);
      } catch(e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('empty').classList.remove('hidden');
      }
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      const live = (data.live || []).map(renderCard('live')).join('');
      const upcoming = (data.upcoming || []).map(renderCard('upcoming')).join('');
      const ended = (data.ended || []).map(renderCard('ended')).join('');

      document.getElementById('live-list').innerHTML = live || '<div class="empty-state"><div class="empty-state__icon">🏆</div><div class="empty-state__title">暂无进行中赛事</div></div>';
      document.getElementById('upcoming-list').innerHTML = upcoming || '<div class="empty-state"><div class="empty-state__icon">📅</div><div class="empty-state__title">暂无即将开始的赛事</div></div>';
      document.getElementById('ended-list').innerHTML = ended || '<div class="empty-state"><div class="empty-state__icon">✅</div><div class="empty-state__title">暂无已结束赛事</div></div>';
    }

    function renderCard(status) {
      return function(t) {
        const statusLabel = {live:'进行中', upcoming:'即将开始', ended:'已结束'}[status];
        const statusClass = {live:'badge--live', upcoming:'badge--upcoming', ended:'badge--ended'}[status];
        const prize = t.prize_pool ? `<span class="tournament-card__prize">奖池 <strong>${t.prize_pool.toLocaleString()}</strong> 筹码</span>` : '<span class="tournament-card__prize">—</span>';
        const btn = status === 'live'
          ? `<button class="btn btn-primary" onclick="join(${t.id})">立即参赛</button>`
          : status === 'upcoming'
          ? `<button class="btn btn-secondary" onclick="signup(${t.id})">报名</button>`
          : `<button class="btn btn-secondary" onclick="view(${t.id})">查看详情</button>`;
        return `
          <div class="tournament-card">
            <div class="tournament-card__header">
              <span class="tournament-card__name">${esc(t.name)}</span>
              <span class="tournament-card__badge ${statusClass}">${statusLabel}</span>
            </div>
            <div class="tournament-card__meta">
              <div class="meta-item"><div class="meta-item__value">${t.entry_fee || 0}</div><div class="meta-item__label">入场费</div></div>
              <div class="meta-item"><div class="meta-item__value">${t.players_count || 0}/${t.max_players || '–'}</div><div class="meta-item__label">参赛人数</div></div>
              <div class="meta-item"><div class="meta-item__value">${t.rounds || '–'}</div><div class="meta-item__label">回合数</div></div>
            </div>
            <div class="tournament-card__footer">
              ${prize}
              ${btn}
            </div>
          </div>`;
      };
    }

    async function join(id) {
      toast('暂未开放，敬请期待');
    }
    async function signup(id) {
      toast('报名已开启');
    }
    async function view(id) {
      toast('查看往期赛事');
    }

    function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    load();
  </script>
</body>
</html>
