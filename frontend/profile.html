<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>我的 — 温州麻将</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg:       rgba(0,0,0,0.42);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --radius-sm:   6px; --radius-md:  12px; --radius-lg:  18px;
      --radius-xl:  24px; --radius-full: 9999px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:   120ms; --duration-normal: 220ms;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--ink);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(var(--safe-bottom) + 90px);
    }
    .header {
      position: sticky; top: 0; z-index: 50;
      padding: var(--radius-md) var(--radius-lg) calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      padding-top: calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid rgba(212,175,55,0.20);
      display: flex; align-items: center; justify-content: space-between; gap: var(--radius-md);
    }
    .header-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; flex: 1; text-align: center; }
    .page { padding: var(--radius-lg); max-width: 480px; margin: 0 auto; }
    .page-title { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
    .profile-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--gold-border); border-radius: var(--radius-xl); padding: var(--radius-xl); text-align: center; margin-bottom: var(--radius-xl); }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, rgba(212,175,55,0.20), rgba(212,175,55,0.08)); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: var(--gold); margin: 0 auto var(--radius-md); font-family: 'Noto Serif SC', serif; }
    .profile-name { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .profile-id { font-size: 0.72rem; color: var(--ink-muted); font-family: monospace; }
    .profile-chips { margin-top: var(--radius-md); display: flex; align-items: center; justify-content: center; gap: var(--radius-sm); }
    .profile-chips__label { font-size: 0.75rem; color: var(--ink-muted); }
    .profile-chips__value { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 900; color: var(--gold); }
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--radius-md); margin-bottom: var(--radius-xl); }
    .stat-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--radius-md) var(--radius-sm); text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .stat-card__value { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-card__label { font-size: 0.65rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .menu-group { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); overflow: hidden; margin-bottom: var(--radius-lg); }
    .menu-item { display: flex; align-items: center; justify-content: space-between; padding: var(--radius-md) var(--radius-lg); border-bottom: 1px solid rgba(255,255,255,0.07); cursor: pointer; transition: background var(--duration-fast); }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: rgba(255,255,255,0.05); }
    .menu-item__left { display: flex; align-items: center; gap: var(--radius-md); }
    .menu-item__icon { font-size: 1.2rem; }
    .menu-item__label { font-size: 0.88rem; color: var(--ink); }
    .menu-item__arrow { font-size: 0.8rem; color: var(--ink-faint); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 18px; border-radius: var(--radius-md); font-size: 0.82rem; font-weight: 700; font-family: inherit; cursor: pointer; border: 1.5px solid transparent; transition: all var(--duration-fast) var(--ease-out); white-space: nowrap; width: 100%; }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn--danger { background: rgba(180,50,50,0.70); border-color: rgba(220,80,80,0.40); color: #ffcccc; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: var(--radius-md); color: var(--ink-muted); font-size: 0.85rem; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.80); backdrop-filter: blur(8px); color: var(--ink); padding: 10px 22px; border-radius: 9999px; font-size: 0.82rem; z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(255,255,255,0.10); animation: toastIn 0.25s var(--ease-out) both; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-8px); } }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-around; padding: var(--radius-sm) env(safe-area-inset-bottom, var(--radius-sm)); padding-bottom: calc(var(--radius-sm) + env(safe-area-inset-bottom, 0px)); background: rgba(0,0,0,0.50); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-top: 1px solid rgba(212,175,55,0.25); }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: var(--radius-sm) var(--radius-md); border-radius: var(--radius-md); cursor: pointer; transition: background var(--duration-fast), transform var(--duration-fast); min-width: 60px; -webkit-tap-highlight-color: transparent; }
    .tab-item:active { transform: scale(0.90); background: rgba(255,255,255,0.06); }
    .tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; transition: transform var(--duration-normal) var(--ease-spring); }
    .tab-icon svg { width: 100%; height: 100%; }
    .tab-label { font-size: 0.62rem; font-weight: 500; color: var(--ink-muted); transition: color var(--duration-fast); letter-spacing: 0.02em; }
    .tab-item--active .tab-label { color: var(--gold); font-weight: 600; }
    .tab-item--active .tab-icon { transform: translateY(-2px); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="header">
    <span class="header-title">个人中心</span>
  </header>

  <div class="page">
    <div class="profile-card">
      <div class="profile-avatar" id="avatar-initial">?</div>
      <div class="profile-name" id="profile-name">加载中…</div>
      <div class="profile-id" id="profile-id">—</div>
      <div class="profile-chips">
        <span class="profile-chips__label">筹码</span>
        <span class="profile-chips__value" id="profile-chips">—</span>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-card__value" id="stat-games">—</span>
        <span class="stat-card__label">总局数</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="stat-wins">—</span>
        <span class="stat-card__label">胜场</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="stat-rate">—</span>
        <span class="stat-card__label">胜率</span>
      </div>
    </div>

    <div class="menu-group">
      <div class="menu-item" onclick="location.href='records.html'">
        <div class="menu-item__left">
          <span class="menu-item__icon">📊</span>
          <span class="menu-item__label">我的战绩</span>
        </div>
        <span class="menu-item__arrow">›</span>
      </div>
      <div class="menu-item" onclick="location.href='leaderboard.html'">
        <div class="menu-item__left">
          <span class="menu-item__icon">🏆</span>
          <span class="menu-item__label">排行榜</span>
        </div>
        <span class="menu-item__arrow">›</span>
      </div>
      <div class="menu-item">
        <div class="menu-item__left">
          <span class="menu-item__icon">⚙️</span>
          <span class="menu-item__label">设置</span>
        </div>
        <span class="menu-item__arrow">›</span>
      </div>
      <div class="menu-item">
        <div class="menu-item__left">
          <span class="menu-item__icon">📖</span>
          <span class="menu-item__label">游戏规则</span>
        </div>
        <span class="menu-item__arrow">›</span>
      </div>
    </div>

    <button class="btn btn--danger" id="btn-logout">退出登录</button>
  </div>

  <nav class="tab-bar" aria-label="主导航">
    <div class="tab-item" onclick="location.href='index.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></div>
      <span class="tab-label">大厅</span>
    </div>
    <div class="tab-item" onclick="location.href='records.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="19" rx="1"/></svg></div>
      <span class="tab-label">战绩</span>
    </div>
    <div class="tab-item" onclick="location.href='tournaments.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 000-5C17 4 17 7 17 7"/><path d="M4 22h16"/><path d="M10 22V8a4 4 0 00-4-4H6"/><path d="M14 22V8a4 4 0 014-4h0"/><path d="M8 6h8l2 4H6L8 6z"/></svg></div>
      <span class="tab-label">比赛场</span>
    </div>
    <div class="tab-item" onclick="location.href='leaderboard.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <span class="tab-label">排行</span>
    </div>
    <div class="tab-item tab-item--active" role="tab">
      <div class="tab-icon" style="color:var(--gold)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <span class="tab-label" style="color:var(--gold)">我的</span>
    </div>
  </nav>

  <script>
    const API = '/api';
    const playerId = localStorage.getItem('mahjong_player');

    function toast(msg) {
      const old = document.getElementById('toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 2200);
    }

    function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function load() {
      if (!playerId) {
        document.getElementById('profile-name').textContent = '未登录';
        return;
      }
      document.getElementById('profile-name').textContent = playerId;
      document.getElementById('profile-id').textContent = 'ID: ' + playerId;
      document.getElementById('avatar-initial').textContent = (playerId.charAt(0) || '?').toUpperCase();

      try {
        const res = await fetch(API + '/player/games?player_id=' + encodeURIComponent(playerId) + '&limit=100');
        if (res.ok) {
          const data = await res.json();
          const games = data.games || [];
          const wins = games.filter(g => g.is_winner).length;
          const rate = games.length ? Math.round(wins / games.length * 100) : 0;
          document.getElementById('stat-games').textContent = games.length;
          document.getElementById('stat-wins').textContent = wins;
          document.getElementById('stat-rate').textContent = rate + '%';
        }
        // Try to get chips from leaderboard
        const lbRes = await fetch(API + '/leaderboard');
        if (lbRes.ok) {
          const lb = await lbRes.json();
          const me = lb.find(p => p.id === playerId);
          if (me) {
            document.getElementById('profile-chips').textContent = (me.chips || 0).toLocaleString();
          }
        }
      } catch(e) { console.error(e); }
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('player_id');
      localStorage.removeItem('guest_id');
      toast('已退出，即将返回登录页');
      setTimeout(() => location.href = 'login.html', 1500);
    });

    load();
  </script>
</body>
</html>
