<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雀巢 Mahjong — 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --gold-glow:     rgba(212,175,55,0.22);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg:       rgba(0,0,0,0.42);
      --glass-bg-card:  rgba(0,0,0,0.35);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --panel-bg:       rgba(0,0,0,0.50);
      --panel-border:   rgba(212,175,55,0.15);
      --radius-sm:   6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:   120ms;
      --duration-normal: 220ms;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }
    /* ─── Sidebar ─── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.55);
      border-right: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, rgba(212,175,55,0.20), rgba(212,175,55,0.08));
      border: 1px solid rgba(212,175,55,0.30);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .sidebar-brand-text { display: flex; flex-direction: column; }
    .sidebar-brand-name { font-family: 'Noto Serif SC', serif; font-size: 1rem; font-weight: 900; color: var(--gold); letter-spacing: 0.08em; line-height: 1; }
    .sidebar-brand-sub { font-size: 0.65rem; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .nav-section-label { font-size: 0.62rem; font-weight: 700; color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-md);
      color: var(--ink-muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      transition: background var(--duration-fast), color var(--duration-fast);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--ink); }
    .nav-item.active { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,175,55,0.20); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .admin-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-md); background: rgba(255,255,255,0.04); }
    .admin-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; color: var(--bg-base); flex-shrink: 0; }
    .admin-info { flex: 1; overflow: hidden; }
    .admin-name { font-size: 0.80rem; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .admin-role { font-size: 0.65rem; color: var(--ink-muted); }
    /* ─── Main ─── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      background: rgba(0,0,0,0.40);
      border-bottom: 1px solid var(--panel-border);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .topbar-time { font-size: 0.78rem; color: var(--ink-muted); font-variant-numeric: tabular-nums; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 0.5rem 1rem; border-radius: var(--radius-md); font-size: 0.82rem; font-weight: 600; font-family: inherit; cursor: pointer; border: 1.5px solid transparent; transition: all var(--duration-fast) var(--ease-out); white-space: nowrap; }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-gold { background: linear-gradient(135deg, rgba(212,175,55,0.85), rgba(212,175,55,0.70)); border-color: var(--gold); color: var(--bg-base); box-shadow: 0 3px 12px rgba(212,175,55,0.25); }
    .btn-gold:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); box-shadow: 0 5px 18px rgba(212,175,55,0.40); transform: translateY(-1px); }
    .btn-outline { background: transparent; border-color: var(--gold-border); color: var(--gold); }
    .btn-outline:hover { background: var(--gold-dim); }
    .btn-ghost { background: transparent; border-color: rgba(255,255,255,0.15); color: var(--ink-muted); }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--ink); }
    .btn-danger { background: rgba(160,40,40,0.80); border-color: rgba(200,80,80,0.45); color: #ffcccc; }
    .btn-danger:hover { background: rgba(180,50,50,0.90); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
    .content { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; flex: 1; }
    /* ─── Stats Grid ─── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card {
      background: var(--glass-bg-card);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      padding: 20px 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color var(--duration-normal), box-shadow var(--duration-normal);
    }
    .stat-card:hover { border-color: rgba(212,175,55,0.40); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
    .stat-card__header { display: flex; align-items: center; justify-content: space-between; }
    .stat-card__icon { width: 38px; height: 38px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .stat-card__trend { font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-full); display: flex; align-items: center; gap: 3px; }
    .stat-card__trend.up { background: rgba(80,180,80,0.15); color: #6fcf6f; }
    .stat-card__trend.down { background: rgba(220,80,80,0.15); color: #eb5757; }
    .stat-card__value { font-family: 'Noto Serif SC', serif; font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1; letter-spacing: -0.02em; }
    .stat-card__label { font-size: 0.75rem; color: var(--ink-muted); font-weight: 500; }
    /* ─── Charts Row ─── */
    .charts-row { display: grid; grid-template-columns: 1fr 380px; gap: 16px; }
    .card {
      background: var(--glass-bg-card);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .card-title { font-size: 0.88rem; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
    .card-body { padding: 16px 20px; }
    .card-body.no-padding { padding: 0; }
    /* ─── Chart placeholder ─── */
    .chart-area { height: 220px; display: flex; flex-direction: column; }
    .chart-bars { flex: 1; display: flex; align-items: flex-end; gap: 8px; padding: 0 4px; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .chart-bar { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(to top, rgba(212,175,55,0.60), rgba(212,175,55,0.25)); transition: background var(--duration-fast); min-height: 8px; position: relative; cursor: default; }
    .chart-bar:hover { background: linear-gradient(to top, rgba(212,175,55,0.85), rgba(212,175,55,0.45)); }
    .chart-bar.highlight { background: linear-gradient(to top, var(--gold), rgba(212,175,55,0.50)); }
    .chart-bar__tooltip { position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: var(--gold); font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity var(--duration-fast); border: 1px solid rgba(212,175,55,0.25); }
    .chart-bar:hover .chart-bar__tooltip { opacity: 1; }
    .chart-bar__label { font-size: 0.62rem; color: var(--ink-faint); text-align: center; }
    /* ─── Pie chart ─── */
    .pie-wrap { display: flex; align-items: center; gap: 20px; }
    .pie-svg { width: 160px; height: 160px; flex-shrink: 0; }
    .pie-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
    .pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pie-legend-label { color: var(--ink-muted); flex: 1; }
    .pie-legend-value { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
    /* ─── Table ─── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th { padding: 10px 16px; text-align: left; color: var(--ink-muted); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap; background: rgba(0,0,0,0.20); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background var(--duration-fast); }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody td { padding: 10px 16px; color: var(--ink); vertical-align: middle; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: var(--radius-full); font-size: 0.70rem; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; }
    .badge-green  { background: rgba(60,160,90,0.18); color: #6fcf6f; border: 1px solid rgba(60,160,90,0.30); }
    .badge-gold   { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid rgba(212,175,55,0.25); }
    .badge-red    { background: rgba(200,60,60,0.18); color: #eb7474; border: 1px solid rgba(200,60,60,0.30); }
    .badge-grey   { background: rgba(255,255,255,0.08); color: var(--ink-muted); border: 1px solid rgba(255,255,255,0.12); }
    .badge-blue   { background: rgba(60,120,200,0.18); color: #74a0eb; border: 1px solid rgba(60,120,200,0.30); }
    /* ─── Modal ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.60); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; pointer-events: none; opacity: 0; transition: opacity var(--duration-normal); }
    .modal-overlay:not(.hidden) { opacity: 1; pointer-events: auto; }
    .modal-box { background: var(--bg-base-alt); border: 1.5px solid var(--gold); border-radius: var(--radius-xl); padding: 28px 24px; max-width: 480px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 64px rgba(0,0,0,0.75), 0 0 0 1px rgba(0,0,0,0.3), 0 0 40px rgba(212,175,55,0.12); transform: scale(0.95); transition: transform var(--duration-normal) var(--ease-out); }
    .modal-overlay:not(.hidden) .modal-box { transform: scale(1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .modal-close { background: none; border: none; color: var(--ink-muted); cursor: pointer; font-size: 1.2rem; padding: 4px; border-radius: var(--radius-sm); transition: color var(--duration-fast); }
    .modal-close:hover { color: var(--ink); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--ink-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 8px 12px; background: rgba(0,0,0,0.30); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-md); color: var(--ink); font-family: inherit; font-size: 0.85rem; outline: none; transition: border-color var(--duration-fast), box-shadow var(--duration-fast); }
    .form-input:focus, .form-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    .form-input::placeholder { color: var(--ink-faint); }
    .form-select option { background: #1a2e22; color: var(--ink); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    /* ─── Toast ─── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); color: var(--ink); padding: 10px 22px; border-radius: 9999px; font-size: 0.82rem; z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(212,175,55,0.25); box-shadow: 0 4px 16px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* ─── Responsive ─── */
    @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    .hidden { display: none !important; }
  </style>
</head>

  <div class="main">

      <!-- Charts -->
      <div class="charts-row">
        <div class="card">
          <div class="card-header">
            <span class="card-title">近 7 日对局趋势</span>

          <div class="card-body">

              <div class="chart-bars" id="trend-chart"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">房间状态分布</span>
          </div>
          <div class="card-body">
            <div class="pie-wrap">
              <svg class="pie-svg" viewBox="0 0 100 100" id="pie-chart">
                <circle r="40" cx="50" cy="50" fill="none" stroke="rgba(60,160,90,0.6)" stroke-width="20" stroke-dasharray="125.66 125.66" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
                <circle r="40" cx="50" cy="50" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="20" stroke-dasharray="75.40 175.92" stroke-dashoffset="-125.66" transform="rotate(-90 50 50)"/>
                <circle r="40" cx="50" cy="50" fill="none" stroke="rgba(200,60,60,0.6)" stroke-width="20" stroke-dasharray="50.27 201.06" stroke-dashoffset="-201.06" transform="rotate(-90 50 50)"/>
                <text x="50" y="47" text-anchor="middle" fill="var(--gold)" font-size="10" font-weight="900" font-family="'Noto Serif SC',serif">6</text>
                <text x="50" y="59" text-anchor="middle" fill="var(--ink-muted)" font-size="5">房间</text>
              </svg>
              <div class="pie-legend">
                <div class="pie-legend-item">
                  <span class="pie-legend-dot" style="background:rgba(60,160,90,0.8);"></span>
                  <span class="pie-legend-label">进行中</span>
                  <span class="pie-legend-value">3</span>
                </div>
                <div class="pie-legend-item">
                  <span class="pie-legend-dot" style="background:rgba(212,175,55,0.8);"></span>
                  <span class="pie-legend-label">等待中</span>
                  <span class="pie-legend-value">2</span>
                </div>
                <div class="pie-legend-item">
                  <span class="pie-legend-dot" style="background:rgba(200,60,60,0.8);"></span>
                  <span class="pie-legend-label">已关闭</span>
                  <span class="pie-legend-value">1</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent games -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">最近对局</span>
          <a class="btn btn-ghost btn-sm" href="admin-games.html">查看全部 →</a>
        </div>
        <div class="card-body no-padding">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>房间</th>
                  <th>时间</th>
                  <th>玩家</th>
                  <th>赢家</th>
                  <th>番数</th>
                  <th>结果</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="recent-games-table"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { requireAuth, apiGet, clearAuth } from "./js/admin-auth.js";

    // Auth guard
    if (!requireAuth()) { /* will redirect */ }
    else {
      document.getElementById('btn-logout').addEventListener('click', () => {
        clearAuth();
        window.location.href = "admin-login.html";
      });

      // Load real data
      loadDashboard();

      async function loadDashboard() {
        try {
          // Stats
          const statsRes = await apiGet("/api/admin/stats");
          if (statsRes.ok) {
            const s = await statsRes.json();
            document.getElementById('stat-players').textContent = s.active_players;
            document.getElementById('stat-games').textContent = s.total_games;
            document.getElementById('stat-rooms').textContent = s.active_rooms;
            document.getElementById('stat-online').textContent = s.total_online;
          }

          // Recent games
          const gamesRes = await apiGet("/api/admin/games?limit=10");
          if (gamesRes.ok) {
            const { games } = await gamesRes.json();
            renderRecentGames(games);
          }

          // Room distribution
          const roomsRes = await apiGet("/api/admin/rooms");
          if (roomsRes.ok) {
            const data = await roomsRes.json();
            renderRoomDist(data.rooms || []);
          }

          toast("数据已加载");
        } catch(e) {
          console.error(e);
          toast("加载失败，请刷新");
        }
      }

      function renderRecentGames(games) {
        const tbody = document.getElementById('recent-games-table');
        tbody.innerHTML = '';
        if (!games || games.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--ink-faint);padding:20px;">暂无对局记录</td></tr>';
          return;
        }
        games.forEach(g => {
          const isDraw = !g.winner_id;
          const players = (g.players || []).map(p => p.id).filter(id => !id.startsWith("ai_player_"));
          const gainStr = isDraw ? '—' : `<span style="color:#6fcf6f;font-weight:700;">+${Math.abs(g.chip_changes?.[g.winner_id] || 0).toLocaleString()}</span>`;
          const statusBadge = isDraw
            ? '<span class="badge badge-grey">流局</span>'
            : '<span class="badge badge-green">完结</span>';
          const time = g.finished_at ? new Date(g.finished_at).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><span style="font-family:'Noto Serif SC',serif;font-weight:700;">${g.room_name || '—'}</span></td>
            <td style="color:var(--ink-muted);font-size:0.78rem;">${time}</td>
            <td style="color:var(--ink-muted);font-size:0.78rem;">${players.slice(0,2).join('、')}${players.length > 2 ? '…' : ''}</td>
            <td><span style="font-weight:600;">${g.winner_id || '—'}</span></td>
            <td>${g.han_total > 0 ? `<span class="badge badge-gold">${g.han_total}番</span>` : '<span style="color:var(--ink-faint);">—</span>'}</td>
            <td>${gainStr}</td>
            <td><span style="color:var(--ink-faint);font-size:0.75rem;cursor:pointer;">查看</span></td>
          `;
          tbody.appendChild(row);
        });
      }

      function renderRoomDist(rooms) {
        // Simple live count from real rooms
        const waiting = rooms.filter(r => r.status === 'waiting').length;
        const playing = rooms.filter(r => r.status === 'playing').length;
        const ended = rooms.filter(r => r.status === 'ended').length;
        const total = rooms.length;
        // Render as mini bar indicators
        const container = document.getElementById('trend-chart');
        if (!container) return;
        container.innerHTML = '';
        const segments = [
          { label:'等待中', count: waiting, cls:'chart-bar-wrap' },
          { label:'对战中', count: playing, cls:'chart-bar-wrap' },
          { label:'已结束', count: ended, cls:'chart-bar-wrap' },
        ];
        segments.forEach(seg => {
          const pct = total > 0 ? (seg.count / total) * 100 : 0;
          const w = document.createElement('div');
          w.className = 'chart-bar-wrap';
          w.innerHTML = `
            <div class="chart-bar" style="height:${Math.max(pct, 4)}%">
              <div class="chart-bar__tooltip">${seg.label} ${seg.count} 间</div>
            </div>
            <span class="chart-bar__label">${seg.label}</span>
          `;
          container.appendChild(w);
        });
      }

      function updateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent =
          now.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
      }

      function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      }

      document.getElementById('btn-refresh').addEventListener('click', () => {
        loadDashboard();
      });

      updateTime();
      setInterval(updateTime, 1000);
    }
  </script>
</body>
</html>
