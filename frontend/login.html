<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>温州麻将 — 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:      rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --gold-glow:     rgba(212,175,55,0.22);
      --ink:            #F5F5DC;
      --ink-muted:     rgba(245,245,220,0.68);
      --ink-faint:     rgba(255,255,255,0.40);
      --glass-bg:      rgba(0,0,0,0.42);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:    blur(10px) saturate(140%);
      --radius-sm:   6px;
      --radius-md:  14px;
      --radius-lg:  18px;
      --radius-xl:  28px;
      --radius-full: 9999px;
      --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image:
        radial-gradient(rgba(212,175,55,0.07) 1px, transparent 1px),
        linear-gradient(160deg, var(--bg-base-alt) 0%, var(--bg-base) 60%);
      background-size: 28px 28px, auto;
      min-height: 100dvh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; top: -120px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(45,90,61,0.35) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -100px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      padding: 36px 32px 32px;
      animation: slideUp 0.45s var(--ease-out) both;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .login-wrap::before {
      content: ''; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%); width: 60%; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-border), transparent);
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: var(--radius-lg); font-size: 1.9rem; margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(212,175,55,0.12);
    }
    .brand-name {
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: 1.7rem; font-weight: 900; color: var(--gold);
      letter-spacing: 0.1em; display: block;
    }
    .brand-sub {
      font-size: 0.75rem; color: var(--ink-muted);
      letter-spacing: 0.25em; text-transform: uppercase; margin-top: 5px; display: block;
    }
    /* Tab switcher */
    .tab-switcher {
      display: flex; background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-md);
      padding: 3px; margin-bottom: 20px; gap: 3px;
    }
    .tab-btn {
      flex: 1; height: 38px; background: transparent; border: none;
      border-radius: calc(var(--radius-md) - 2px);
      color: var(--ink-muted); font-family: inherit; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(212,175,55,0.20), rgba(212,175,55,0.10));
      color: var(--gold); border: 1px solid rgba(212,175,55,0.25);
      box-shadow: 0 2px 8px rgba(212,175,55,0.10);
    }
    .tab-btn:not(.active):hover { color: var(--ink); background: rgba(255,255,255,0.05); }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 0.70rem; font-weight: 600;
      color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px;
    }
    .form-input {
      width: 100%; height: 50px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10); border-radius: var(--radius-md);
      padding: 0 18px; color: var(--ink); font-family: inherit; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--ink-faint); }
    .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    .code-row { display: flex; gap: 10px; }
    .code-row .form-input { flex: 1; }
    .get-code-btn {
      height: 50px; padding: 0 16px; background: transparent;
      border: 1px solid var(--gold-border); border-radius: var(--radius-md);
      color: var(--gold); font-family: inherit; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .get-code-btn:not(:disabled):hover { background: var(--gold-dim); box-shadow: 0 0 12px var(--gold-glow); }
    .get-code-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .login-btn {
      width: 100%; height: 52px; margin-top: 6px;
      background: linear-gradient(135deg, #233A2F, #18261E);
      border: 1.5px solid var(--gold); border-radius: 9999px;
      color: var(--gold); font-family: inherit; font-size: 0.92rem;
      font-weight: 700; letter-spacing: 0.08em; cursor: pointer;
      transition: all 0.2s var(--ease-out);
      box-shadow: 0 4px 16px rgba(212,175,55,0.15);
    }
    .login-btn:hover { background: linear-gradient(135deg, #2a4536, #1e3026); box-shadow: 0 6px 24px rgba(212,175,55,0.28); transform: translateY(-1px); }
    .login-btn:active { transform: scale(0.97) translateY(0); box-shadow: 0 2px 10px rgba(212,175,55,0.20); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--ink-faint); font-size: 0.70rem; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10); }
    .guest-btn { display: block; width: 100%; text-align: center; background: none; border: none; color: var(--ink-muted); font-family: inherit; font-size: 0.80rem; cursor: pointer; padding: 10px; border-radius: var(--radius-md); transition: color 0.2s; }
    .guest-btn:hover { color: var(--ink); }
    .agree-tip { text-align: center; margin-top: 24px; color: var(--ink-faint); font-size: 0.68rem; line-height: 1.7; }
    .agree-tip a { color: var(--ink-muted); text-decoration: underline; text-underline-offset: 2px; }
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.80); backdrop-filter: blur(8px); color: var(--ink); padding: 10px 22px; border-radius: 9999px; font-size: 0.82rem; z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(255,255,255,0.10); box-shadow: 0 4px 16px rgba(0,0,0,0.4); animation: toastIn 0.25s var(--ease-out) both; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-8px); } }
  </style>
</head>
<body>
  <div class="login-wrap" role="main">
    <div class="brand">
      <div class="brand-icon">🀄</div>
      <span class="brand-name">温州麻将</span>
      <span class="brand-sub">本地正宗 · 亲友房卡对局</span>
    </div>

    <!-- Tab switcher -->
    <!-- 手机号登录面板（唯一登录方式）-->
    <div class="form-panel active" id="panel-phone">
      <div class="form-group">
        <label class="form-label" for="phone">手机号</label>
        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11" autocomplete="tel" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label class="form-label" for="code">密码</label>
        <input type="password" class="form-input" id="code" placeholder="密码（选填）" autocomplete="current-password" />
      </div>
      <button class="login-btn" id="loginBtn">登录</button>
      <button class="register-btn" id="btn-register">注册账号</button>
    </div>

    <div class="divider">或</div>
    <button class="guest-btn" id="guestBtn">游客试玩，跳过登录</button>

    <div class="agree-tip">
      登录即同意《<a href="#">用户协议</a>》《<a href="#">隐私政策</a>》<br/>
      健康游戏 &nbsp; 禁止赌博
    </div>
  </div>

  <script>
    const phoneInput = document.getElementById('phone');
    const codeInput = document.getElementById('code');
    const getCodeBtn = document.getElementById('getCodeBtn');
    const loginBtn = document.getElementById('loginBtn');
    const guestBtn = document.getElementById('guestBtn');

    function toast(msg) {
      const old = document.getElementById('toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 2000);
    }

    // ── 手机号登录（支持无密码账号 + 首次自动注册）──────────────
    loginBtn.addEventListener('click', () => {
      const phone = phoneInput.value.trim();
      const password = codeInput.value.trim();  // 可为空（支持已注册但无密码的老账号）
      if (!/^1[3-9]\d{9}$/.test(phone)) { toast('请输入正确手机号'); phoneInput.focus(); return; }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      function doLogin() {
        return fetch('/api/players/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        }).then(r => r.json()).then(data => {
          if (data.error === '该手机号未注册') {
            // 首次登录：先注册（昵称=手机号），再登录
            const name = phone;
            return fetch('/api/players', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ phone, name })
            }).then(r => r.json()).then(regData => {
              if (regData.error) { toast(regData.error); loginBtn.disabled = false; loginBtn.textContent = '登录'; return; }
              // 注册成功后自动登录
              return fetch('/api/players/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
              }).then(r => r.json()).then(loginData => {
                if (loginData.ok) {
                  localStorage.setItem('mahjong_player', loginData.player_id);
                  localStorage.setItem('mahjong_player_name', loginData.player.name || name);
                  toast('注册成功，欢迎 ' + (loginData.player.name || name));
                  location.href = 'index.html';
                } else {
                  toast(loginData.error || '登录失败');
                  loginBtn.disabled = false; loginBtn.textContent = '登录';
                }
              });
            });
          }
          if (data.error) { toast(data.error); loginBtn.disabled = false; loginBtn.textContent = '登录'; return; }
          if (!data.ok) { toast('登录失败'); loginBtn.disabled = false; loginBtn.textContent = '登录'; return; }
          localStorage.setItem('mahjong_player', data.player_id);
          localStorage.setItem('mahjong_player_name', data.player.name || phone);
          toast('欢迎回来 ' + (data.player.name || phone));
          location.href = 'index.html';
        });
      }

      doLogin().catch(() => { toast('网络错误，请稍后重试'); loginBtn.disabled = false; loginBtn.textContent = '登录'; });
    });

    // ── 注册账号（POST /api/players → 自动登录）──────────────────
    if (document.getElementById('btn-register')) {
      document.getElementById('btn-register').addEventListener('click', () => {
        const phone = phoneInput.value.trim();
        const name = document.getElementById('register-name') ? document.getElementById('register-name').value.trim() : '';
        if (!/^1[3-9]\d{9}$/.test(phone)) { toast('请输入正确手机号'); return; }
        const password = codeInput.value.trim();
        if (!password) { toast('请设置密码'); codeInput.focus(); return; }

        const btn = document.getElementById('btn-register');
        btn.disabled = true; btn.textContent = '注册中...';

        // 1. 注册
        fetch('/api/players', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, name })
        })
          .then(r => r.json())
          .then(() => {
            // 2. 登录
            return fetch('/api/players/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ phone, password })
            });
          })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              localStorage.setItem('mahjong_player', data.player_id);
              localStorage.setItem('mahjong_player_name', data.player.name || name || phone);
              toast('注册成功，欢迎 ' + (data.player.name || name || phone));
              location.href = 'index.html';
            } else {
              toast(data.error || '注册失败');
              btn.disabled = false; btn.textContent = '注册账号';
            }
          })
          .catch(() => { toast('网络错误，请稍后重试'); btn.disabled = false; btn.textContent = '注册账号'; });
      });
    }

    // ── 游客登录（POST /api/guest/login）─────────────────────────
    guestBtn.addEventListener('click', () => {
      guestBtn.disabled = true;
      guestBtn.textContent = '进入中...';
      const guestId = 'guest_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      const guestName = '游客_' + Math.random().toString(10).slice(2, 6);

      fetch('/api/guest/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guest_id: guestId, name: guestName })
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) { toast(data.error); guestBtn.disabled = false; guestBtn.textContent = '游客试玩'; return; }
          localStorage.setItem('mahjong_player', data.player_id);
          localStorage.setItem('mahjong_player_name', data.player.name || guestName);
          toast('欢迎 ' + (data.player.name || guestName));
          location.href = 'index.html';
        })
        .catch(() => { toast('网络错误，请稍后重试'); guestBtn.disabled = false; guestBtn.textContent = '游客试玩'; });
    });
  </script>
</body>
</html>
