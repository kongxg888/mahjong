<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对局记录 — 雀巢 Mahjong 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --gold-glow:     rgba(212,175,55,0.22);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg-card:  rgba(0,0,0,0.35);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --panel-border:   rgba(212,175,55,0.15);
      --radius-sm:   6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast:   120ms;
      --duration-normal: 220ms;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }
    .sidebar { width:240px;flex-shrink:0;background:rgba(0,0,0,0.55);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto; }
    .sidebar-brand { display:flex;align-items:center;gap:12px;padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06); }
    .sidebar-brand-icon { width:40px;height:40px;background:linear-gradient(135deg,rgba(212,175,55,0.20),rgba(212,175,55,0.08));border:1px solid rgba(212,175,55,0.30);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0; }
    .sidebar-brand-text { display:flex;flex-direction:column; }
    .sidebar-brand-name { font-family:'Noto Serif SC',serif;font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:0.08em;line-height:1; }
    .sidebar-brand-sub { font-size:0.65rem;color:var(--ink-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px; }
    .sidebar-nav { padding:16px 12px;flex:1;display:flex;flex-direction:column;gap:4px; }
    .nav-section-label { font-size:0.62rem;font-weight:700;color:var(--ink-faint);letter-spacing:0.12em;text-transform:uppercase;padding:8px 8px 4px; }
    .nav-item { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);color:var(--ink-muted);text-decoration:none;font-size:0.85rem;font-weight:500;transition:background var(--duration-fast),color var(--duration-fast);cursor:pointer;border:none;background:none;width:100%;text-align:left; }
    .nav-item:hover { background:rgba(255,255,255,0.06);color:var(--ink); }
    .nav-item.active { background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,175,55,0.20); }
    .nav-item svg { flex-shrink:0;opacity:0.7; }
    .nav-item.active svg { opacity:1; }
    .sidebar-footer { padding:16px 12px;border-top:1px solid rgba(255,255,255,0.06); }
    .admin-user { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);background:rgba(255,255,255,0.04); }
    .admin-avatar { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:900;color:var(--bg-base);flex-shrink:0; }
    .admin-info { flex:1;overflow:hidden; }
    .admin-name { font-size:0.80rem;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .admin-role { font-size:0.65rem;color:var(--ink-muted); }
    .main { flex:1;min-width:0;display:flex;flex-direction:column; }
    .topbar { display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(0,0,0,0.40);border-bottom:1px solid var(--panel-border);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px; }
    .topbar-title { font-family:'Noto Serif SC',serif;font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.06em; }
    .topbar-actions { display:flex;align-items:center;gap:10px; }
    .btn { display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.82rem;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid transparent;transition:all var(--duration-fast) var(--ease-out);white-space:nowrap; }
    .btn:active:not(:disabled) { transform:scale(0.95); }
    .btn:disabled { opacity:0.4;cursor:not-allowed; }
    .btn-gold { background:linear-gradient(135deg,rgba(212,175,55,0.85),rgba(212,175,55,0.70));border-color:var(--gold);color:var(--bg-base);box-shadow:0 3px 12px rgba(212,175,55,0.25); }
    .btn-gold:hover { background:linear-gradient(135deg,var(--gold),var(--gold-light));box-shadow:0 5px 18px rgba(212,175,55,0.40);transform:translateY(-1px); }
    .btn-outline { background:transparent;border-color:var(--gold-border);color:var(--gold); }
    .btn-outline:hover { background:var(--gold-dim); }
    .btn-ghost { background:transparent;border-color:rgba(255,255,255,0.15);color:var(--ink-muted); }
    .btn-ghost:hover { background:rgba(255,255,255,0.06);color:var(--ink); }
    .btn-sm { padding:0.3rem 0.7rem;font-size:0.75rem; }
    .content { padding:24px 28px;display:flex;flex-direction:column;gap:20px;flex:1; }
    .stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:16px; }
    .stat-card { background:var(--glass-bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:0 4px 16px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:6px; }
    .stat-card__label { font-size:0.72rem;color:var(--ink-muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase; }
    .stat-card__value { font-family:'Noto Serif SC',serif;font-size:1.8rem;font-weight:900;color:var(--gold);line-height:1; }
    .toolbar { display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
    .toolbar-search { display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.30);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-md);padding:0 12px;flex:1;max-width:280px; }
    .toolbar-search input { background:none;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:0.85rem;padding:8px 0;width:100%; }
    .toolbar-search input::placeholder { color:var(--ink-faint); }
    .toolbar-search:focus-within { border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow); }
    .filter-tabs { display:flex;gap:4px; }
    .filter-tab { padding:6px 14px;border-radius:var(--radius-full);font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.10);background:none;color:var(--ink-muted);transition:all var(--duration-fast); }
    .filter-tab:hover { background:rgba(255,255,255,0.06); }
    .filter-tab.active { background:var(--gold-dim);border-color:rgba(212,175,55,0.35);color:var(--gold); }
    .filter-tab .count { font-size:0.65rem;opacity:0.75;margin-left:2px; }
    .card { background:var(--glass-bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:0 4px 16px rgba(0,0,0,0.3);overflow:hidden; }
    .card-header { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.07); }
    .card-title { font-size:0.88rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px; }
    .card-title::before { content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px; }
    .card-body { padding:0; }
    .table-wrap { overflow-x:auto; }
    table { width:100%;border-collapse:collapse;font-size:0.82rem; }
    thead th { padding:10px 16px;text-align:left;color:var(--ink-muted);font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);white-space:nowrap;background:rgba(0,0,0,0.20);position:sticky;top:0; }
    tbody tr { border-bottom:1px solid rgba(255,255,255,0.05);transition:background var(--duration-fast); }
    tbody tr:hover { background:rgba(255,255,255,0.04); }
    tbody td { padding:10px 16px;color:var(--ink);vertical-align:middle; }
    .badge { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:var(--radius-full);font-size:0.70rem;font-weight:700;letter-spacing:0.02em;white-space:nowrap; }
    .badge-green  { background:rgba(60,160,90,0.18);color:#6fcf6f;border:1px solid rgba(60,160,90,0.30); }
    .badge-gold   { background:rgba(212,175,55,0.15);color:var(--gold);border:1px solid rgba(212,175,55,0.25); }
    .badge-grey   { background:rgba(255,255,255,0.08);color:var(--ink-muted);border:1px solid rgba(255,255,255,0.12); }
    .badge-blue   { background:rgba(60,120,200,0.18);color:#74a0eb;border:1px solid rgba(60,120,200,0.30); }
    /* Expandable row */
    .game-row { cursor:pointer; }
    .game-row.expanded { background:rgba(212,175,55,0.04); }
    .expand-icon { display:inline-block;width:16px;height:16px;text-align:center;line-height:16px;color:var(--ink-faint);transition:transform var(--duration-fast);font-size:0.7rem; }
    .game-row.expanded .expand-icon { transform:rotate(90deg); }
    .han-detail-row { display:none; background:rgba(0,0,0,0.25); }
    .han-detail-row.open { display:table-row; }
    .han-detail-row td { padding:12px 16px 12px 40px !important; border-top:1px solid rgba(255,255,255,0.06); }
    .han-breakdown { display:flex;flex-wrap:wrap;gap:8px; }
    .han-item { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:var(--radius-full);font-size:0.75rem; }
    .han-item-name { color:var(--ink-muted); }
    .han-item-val { color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums; }
    .player-result { display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:var(--radius-full);font-size:0.78rem; }
    .player-result.winner { background:rgba(60,160,90,0.15);border:1px solid rgba(60,160,90,0.25);color:#6fcf6f; }
    .player-result.loser { background:rgba(200,60,60,0.10);border:1px solid rgba(200,60,60,0.20);color:#eb7474; }
    .player-result.draw { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);color:var(--ink-muted); }
    /* Pagination */
    .pagination { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;gap:10px; }
    .pagination-info { font-size:0.78rem;color:var(--ink-muted); }
    .pagination-info span { color:var(--gold);font-weight:700; }
    .pagination-btns { display:flex;gap:6px; }
    .page-btn { min-width:34px;height:34px;padding:0 8px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,0.12);background:none;color:var(--ink-muted);font-size:0.80rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--duration-fast); }
    .page-btn:hover:not(:disabled) { background:rgba(255,255,255,0.06);color:var(--ink); }
    .page-btn.active { background:var(--gold-dim);border-color:rgba(212,175,55,0.35);color:var(--gold); }
    .page-btn:disabled { opacity:0.3;cursor:not-allowed; }
    /* Modal */
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.60);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:none;opacity:0;transition:opacity var(--duration-normal); }
    .modal-overlay:not(.hidden) { opacity:1;pointer-events:auto; }
    .modal-box { background:var(--bg-base-alt);border:1.5px solid var(--gold);border-radius:var(--radius-xl);padding:28px 24px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 16px 64px rgba(0,0,0,0.75),0 0 40px rgba(212,175,55,0.12);transform:scale(0.95);transition:transform var(--duration-normal) var(--ease-out); }
    .modal-overlay:not(.hidden) .modal-box { transform:scale(1); }
    .modal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
    .modal-title { font-family:'Noto Serif SC',serif;font-size:1.1rem;font-weight:700;color:var(--gold); }
    .modal-close { background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:1.2rem;padding:4px;border-radius:var(--radius-sm);transition:color var(--duration-fast); }
    .modal-close:hover { color:var(--ink); }
    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);color:var(--ink);padding:10px 22px;border-radius:9999px;font-size:0.82rem;z-index:999;pointer-events:none;white-space:nowrap;border:1px solid rgba(212,175,55,0.25);box-shadow:0 4px 16px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.2s,transform 0.2s; }
    .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
    @media (max-width:1200px) { .stats-row{grid-template-columns:repeat(2,1fr);} }
    @media (max-width:768px) { .sidebar{display:none;} .content{padding:16px;} .topbar{padding:12px 16px;} .stats-row{grid-template-columns:1fr 1fr;} }
    ::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🀄</div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">雀巢</span>
        <span class="sidebar-brand-sub">Mahjong Admin</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">概览</div>
      <a class="nav-item" href="admin-dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        仪表盘
      </a>
      <div class="nav-section-label">运营管理</div>
      <a class="nav-item" href="admin-rooms.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        房间列表
      </a>
      <a class="nav-item" href="admin-players.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        玩家记录
      </a>
      <a class="nav-item active" href="admin-games.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        对局记录
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-user">
        <div class="admin-avatar">管</div>
        <div class="admin-info">
          <div class="admin-name">管理员</div>
          <div class="admin-role">超级管理员</div>
        </div>
      </div>
      <button class="btn btn-secondary" id="btn-logout" style="margin-top:8px;font-size:0.75rem;padding:6px 12px;width:100%;justify-content:center;">退出登录</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <h1 class="topbar-title">对局记录</h1>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" id="btn-export">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出CSV
        </button>
      </div>
    </header>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card__label">今日对局</div>
          <div class="stat-card__value">128</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">本月总计</div>
          <div class="stat-card__value">3,842</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">总番数</div>
          <div class="stat-card__value" style="font-size:1.5rem;">9,261</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">流局率</div>
          <div class="stat-card__value" style="font-size:1.5rem;">6.8%</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="搜索房间或赢家…" />
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">全部 <span class="count">42</span></button>
          <button class="filter-tab" data-filter="win">胡牌 <span class="count">38</span></button>
          <button class="filter-tab" data-filter="draw">流局 <span class="count">4</span></button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">全部对局 <span style="font-size:0.72rem;color:var(--ink-faint);font-weight:400;margin-left:6px;">共 42 条</span></span>
        </div>
        <div class="card-body no-padding">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:30px;"></th>
                  <th>房间</th>
                  <th>时间</th>
                  <th>结果</th>
                  <th>赢家</th>
                  <th>番数</th>
                  <th>战绩明细</th>
                </tr>
              </thead>
              <tbody id="games-table"></tbody>
            </table>
          </div>
        </div>
        <div class="pagination">
          <span class="pagination-info">显示 <span>1</span>–<span>10</span>，共 <span>42</span> 条</span>
          <div class="pagination-btns">
            <button class="page-btn" disabled>‹</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">…</button>
            <button class="page-btn">5</button>
            <button class="page-btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { requireAuth, apiGet, clearAuth } from "./js/admin-auth.js";

    if (!requireAuth()) { /* redirect */ }
    else {
      let GAMES = [];
      let expandedRow = null;
      let currentFilter = 'all';
      let searchQuery = '';
      let currentPage = 0;
      const PAGE_SIZE = 20;

      document.getElementById('btn-logout').addEventListener('click', () => { clearAuth(); window.location.href = "admin-login.html"; });

      async function loadGames(page = 0) {
        currentPage = page;
        try {
          const res = await apiGet(`/api/admin/games?limit=${PAGE_SIZE}&offset=${page * PAGE_SIZE}`);
          if (res.ok) {
            const data = await res.json();
            GAMES = data.games || [];
            renderGames(data.total);
          }
        } catch(e) { toast("加载失败"); }
      }

      function renderGames(total) {
        const tbody = document.getElementById('games-table');
        tbody.innerHTML = '';
        const q = searchQuery.toLowerCase();
        const filtered = GAMES.filter(g => {
          const matchFilter = currentFilter === 'all' || (currentFilter === 'win' ? !!g.winner_id : !g.winner_id);
          const matchSearch = !q || (g.room_name||'').toLowerCase().includes(q) || (g.winner_id||'').toLowerCase().includes(q);
          return matchFilter && matchSearch;
        });
        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--ink-faint);padding:32px;">暂无对局记录</td></tr>';
          return;
        }
        filtered.forEach((g) => {
          const isExpanded = expandedRow === g.id;
          const isWin = !!g.winner_id;
          const statusBadge = isWin
            ? `<span class="badge badge-green">胡牌</span>`
            : `<span class="badge badge-grey">流局</span>`;
          const players = (g.players||[]).map(p => p.id).filter(id => !id.startsWith('ai_player_'));
          const scores = g.scores || {};
          const chipChanges = g.chip_changes || {};
          const playersCell = players.map(p => {
            const change = chipChanges[p] || 0;
            const isWinner = p === g.winner_id;
            const cls = !isWin ? 'draw' : isWinner ? 'winner' : 'loser';
            const sign = change > 0 ? '+' : '';
            return `<span class="player-result ${cls}">${p}<span style="opacity:0.7;font-size:0.72rem;">${isWin ? sign+change : '—'}</span></span>`;
          }).join('');
          const time = g.finished_at ? new Date(g.finished_at).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
          const row = document.createElement('tr');
          row.className = 'game-row' + (isExpanded ? ' expanded' : '');
          row.innerHTML = `
            <td><span class="expand-icon">▶</span></td>
            <td><span style="font-family:'Noto Serif SC',serif;font-weight:700;">${g.room_name||'—'}</span><br><code style="font-size:0.68rem;color:var(--ink-faint);font-family:'JetBrains Mono',monospace;">${g.id.slice(0,8)}…</code></td>
            <td><span style="font-size:0.80rem;color:var(--ink-muted);">${time}</span></td>
            <td>${statusBadge}</td>
            <td>${g.winner_id ? `<span style="font-weight:700;color:var(--gold);">${g.winner_id}</span>` : '<span style="color:var(--ink-faint);">—</span>'}</td>
            <td>${g.han_total > 0 ? `<span class="badge badge-gold">${g.han_total}番</span>` : '<span style="color:var(--ink-faint);">—</span>'}</td>
            <td>${playersCell}</td>`;
          row.addEventListener('click', () => toggleRow(g.id));
          tbody.appendChild(row);

          const detailRow = document.createElement('tr');
          detailRow.className = 'han-detail-row' + (isExpanded ? ' open' : '');
          const hanList = g.han_breakdown || [];
          const hanItems = hanList.length
            ? hanList.map(h => `<span class="han-item"><span class="han-item-name">${h.name||'—'}</span><span class="han-item-val">×${h.value||1}</span></span>`).join('')
            : '<span style="color:var(--ink-faint);font-size:0.80rem;">无番数记录（流局）</span>';
          detailRow.innerHTML = `<td colspan="7"><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;"><span style="font-size:0.72rem;color:var(--ink-muted);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0;">番数明细</span>${hanItems}</div></td>`;
          tbody.appendChild(detailRow);
        });
      }

      function toggleRow(id) {
        expandedRow = expandedRow === id ? null : id;
        renderGames();
      }

      function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      }

      document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderGames(); });
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          renderGames();
        });
      });
      document.getElementById('btn-export').addEventListener('click', () => toast('CSV 导出开发中'));

      loadGames();
    }
  </script>
</body>
</html>
