<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>战绩 — 温州麻将</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-light:     #E8C962;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg:       rgba(0,0,0,0.42);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --radius-sm:   6px; --radius-md:  12px; --radius-lg:  18px;
      --radius-xl:  24px; --radius-full: 9999px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast:   120ms; --duration-normal: 220ms;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--ink);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(var(--safe-bottom) + 90px);
    }
    .header {
      position: sticky; top: 0; z-index: 50;
      padding: var(--radius-md) var(--radius-lg) calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      padding-top: calc(var(--radius-md) + env(safe-area-inset-top, 0px));
      background: rgba(0,0,0,0.60);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid rgba(212,175,55,0.20);
      display: flex; align-items: center; gap: var(--radius-md);
    }
    .header-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; flex: 1; }
    .page { padding: var(--radius-lg); max-width: 480px; margin: 0 auto; }
    .page-title { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
    .page-sub { font-size: 0.78rem; color: var(--ink-muted); margin-bottom: var(--radius-xl); }
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--radius-md); margin-bottom: var(--radius-xl); }
    .stat-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--radius-md) var(--radius-sm); text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .stat-card__value { font-family: 'Noto Serif SC', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-card__label { font-size: 0.65rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .section-title { font-size: 0.72rem; font-weight: 700; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.10em; margin-bottom: var(--radius-md); display: flex; align-items: center; gap: var(--radius-sm); }
    .section-title::before { content: ''; display: block; width: 3px; height: 1em; background: var(--gold); border-radius: 2px; }
    .game-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: var(--radius-lg); margin-bottom: var(--radius-md); cursor: pointer; transition: border-color var(--duration-fast), transform var(--duration-fast) var(--ease-out); }
    .game-card:active { transform: scale(0.98); }
    .game-card__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--radius-md); }
    .game-card__date { font-size: 0.72rem; color: var(--ink-faint); }
    .game-card__result { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--radius-full); font-size: 0.68rem; font-weight: 700; }
    .result--win { background: rgba(212,175,55,0.18); color: var(--gold); border: 1px solid rgba(212,175,55,0.30); }
    .result--lose { background: rgba(180,50,50,0.15); color: #e07070; border: 1px solid rgba(180,50,50,0.25); }
    .game-card__chips { display: flex; align-items: center; justify-content: space-between; }
    .game-card__change { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 900; }
    .change--win { color: #6fcf6f; }
    .change--lose { color: #eb5757; }
    .game-card__meta { font-size: 0.72rem; color: var(--ink-muted); margin-top: var(--radius-sm); }
    .game-card__footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.07); padding-top: var(--radius-md); margin-top: var(--radius-md); }
    .game-card__winner { font-size: 0.78rem; color: var(--ink-muted); }
    .game-card__winner strong { color: var(--gold); font-weight: 700; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: var(--radius-md); color: var(--ink-muted); font-size: 0.85rem; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--radius-xl) var(--radius-lg); text-align: center; gap: var(--radius-md); }
    .empty-state__icon { font-size: 3rem; opacity: 0.4; }
    .empty-state__title { font-family: 'Noto Serif SC', serif; font-size: 1rem; color: var(--ink-muted); }
    .empty-state__sub { font-size: 0.80rem; color: var(--ink-faint); max-width: 200px; }
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.80); backdrop-filter: blur(8px); color: var(--ink); padding: 10px 22px; border-radius: 9999px; font-size: 0.82rem; z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(255,255,255,0.10); animation: toastIn 0.25s var(--ease-out) both; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-8px); } }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-around; padding: var(--radius-sm) env(safe-area-inset-bottom, var(--radius-sm)); padding-bottom: calc(var(--radius-sm) + env(safe-area-inset-bottom, 0px)); background: rgba(0,0,0,0.50); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-top: 1px solid rgba(212,175,55,0.25); }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: var(--radius-sm) var(--radius-md); border-radius: var(--radius-md); cursor: pointer; transition: background var(--duration-fast), transform var(--duration-fast); min-width: 60px; -webkit-tap-highlight-color: transparent; }
    .tab-item:active { transform: scale(0.90); background: rgba(255,255,255,0.06); }
    .tab-item--active .tab-icon { transform: translateY(-2px); }
    .tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; transition: transform var(--duration-normal) var(--ease-spring); }
    .tab-icon svg { width: 100%; height: 100%; }
    .tab-label { font-size: 0.62rem; font-weight: 500; color: var(--ink-muted); transition: color var(--duration-fast); letter-spacing: 0.02em; }
    .tab-item--active .tab-label { color: var(--gold); font-weight: 600; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="header">
    <span class="header-title">我的战绩</span>
  </header>

  <div class="page">
    <div class="page-title">战绩记录</div>
    <div class="page-sub" id="player-id-label">加载中…</div>

    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-card__value" id="stat-games">—</span>
        <span class="stat-card__label">总局数</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="stat-wins">—</span>
        <span class="stat-card__label">胜利</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__value" id="stat-change">—</span>
        <span class="stat-card__label">累计</span>
      </div>
    </div>

    <div class="section-title">近期对局</div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>加载战绩中…</span>
    </div>
    <div id="content" class="hidden"></div>
    <div id="empty" class="empty-state hidden">
      <div class="empty-state__icon">🀐</div>
      <div class="empty-state__title">暂无对局记录</div>
      <div class="empty-state__sub">去大厅创建一个房间，开始你的第一局吧</div>
    </div>
  </div>

  <nav class="tab-bar" aria-label="主导航">
    <div class="tab-item" onclick="location.href='index.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></div>
      <span class="tab-label">大厅</span>
    </div>
    <div class="tab-item tab-item--active" role="tab">
      <div class="tab-icon" style="color:var(--gold)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="19" rx="1"/></svg></div>
      <span class="tab-label" style="color:var(--gold)">战绩</span>
    </div>
    <div class="tab-item" onclick="location.href='tournaments.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 7 7 7 7"/><path d="M18 9h1.5a2.5 2.5 0 000-5C17 4 17 7 17 7"/><path d="M4 22h16"/><path d="M10 22V8a4 4 0 00-4-4H6"/><path d="M14 22V8a4 4 0 014-4h0"/><path d="M8 6h8l2 4H6L8 6z"/></svg></div>
      <span class="tab-label">比赛场</span>
    </div>
    <div class="tab-item" onclick="location.href='leaderboard.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <span class="tab-label">排行</span>
    </div>
    <div class="tab-item" onclick="location.href='profile.html'" role="tab">
      <div class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <span class="tab-label">我的</span>
    </div>
  </nav>

  <script>
    const API = '/api';
    const playerId = localStorage.getItem('mahjong_player');

    function toast(msg) {
      const old = document.getElementById('toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = 'toast'; t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 2200);
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      } catch(e) { return iso; }
    }

    function fmtChips(n) {
      if (n == null) return '—';
      return (n >= 0 ? '+' : '') + n.toLocaleString();
    }

    async function load() {
      if (!playerId) {
        document.getElementById('player-id-label').textContent = '未登录';
        showEmpty();
        return;
      }
      document.getElementById('player-id-label').textContent = '玩家: ' + playerId;
      try {
        const res = await fetch(API + '/player/games?player_id=' + encodeURIComponent(playerId) + '&limit=50');
        if (!res.ok) throw new Error('加载失败');
        const data = await res.json();
        render(data);
      } catch(e) {
        console.error(e);
        showEmpty();
      }
    }

    function showEmpty() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('empty').classList.remove('hidden');
      document.getElementById('content').classList.add('hidden');
    }

    function render(data) {
      document.getElementById('loading').classList.add('hidden');
      const games = data.games || [];
      if (!games.length) { showEmpty(); return; }
      document.getElementById('content').classList.remove('hidden');

      const totalGames = games.length;
      const wins = games.filter(g => g.is_winner).length;
      const totalChange = games.reduce((s, g) => s + (g.chip_change || 0), 0);
      document.getElementById('stat-games').textContent = totalGames;
      document.getElementById('stat-wins').textContent = wins;
      const changeEl = document.getElementById('stat-change');
      changeEl.textContent = fmtChips(totalChange);
      changeEl.style.color = totalChange >= 0 ? '#6fcf6f' : '#eb5757';

      document.getElementById('content').innerHTML = games.map(g => {
        const isWin = g.is_winner;
        const resultClass = isWin ? 'result--win' : 'result--lose';
        const resultLabel = isWin ? '胜' : '负';
        const changeClass = isWin ? 'change--win' : 'change--lose';
        const change = g.chip_change || 0;
        return `
          <div class="game-card">
            <div class="game-card__header">
              <span class="game-card__date">${fmtDate(g.ended_at)}</span>
              <span class="game-card__result ${resultClass}">${resultLabel}</span>
            </div>
            <div class="game-card__chips">
              <span style="font-size:0.75rem;color:var(--ink-muted)">本局筹码变化</span>
              <span class="game-card__change ${changeClass}">${fmtChips(change)}</span>
            </div>
            <div class="game-card__meta">${g.win_type ? '胡牌方式: ' + g.win_type : '流局'}</div>
            <div class="game-card__footer">
              <span class="game-card__winner">赢家: <strong>${esc(g.winner_name || '—')}</strong></span>
              <span style="font-size:0.70rem;color:var(--ink-faint)">ID: ${g.id}</span>
            </div>
          </div>`;
      }).join('');
    }

    function esc(s) { if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    load();
  </script>
</body>
</html>
