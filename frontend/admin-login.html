<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>管理员登录 — 温州麻将</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:        #18261E;
      --bg-base-alt:    #1a2e22;
      --gold:           #D4AF37;
      --gold-dim:       rgba(212,175,55,0.12);
      --gold-border:    rgba(212,175,55,0.28);
      --gold-glow:      rgba(212,175,55,0.22);
      --ink:            #F5F5DC;
      --ink-muted:      rgba(245,245,220,0.68);
      --ink-faint:      rgba(255,255,255,0.40);
      --glass-bg:       rgba(0,0,0,0.42);
      --glass-border:   rgba(212,175,55,0.28);
      --glass-blur:     blur(10px) saturate(140%);
      --radius-sm:   8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;
      --radius-full: 9999px;
      --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
      background-color: var(--bg-base);
      background-image:
        radial-gradient(rgba(212,175,55,0.07) 1px, transparent 1px),
        linear-gradient(160deg, var(--bg-base-alt) 0%, var(--bg-base) 60%);
      background-size: 28px 28px, auto;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(45,90,61,0.35) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      padding: 40px 32px 36px;
      animation: slideUp 0.45s var(--ease-out) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-border), transparent);
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: var(--radius-lg);
      font-size: 1.75rem; margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(212,175,55,0.12);
    }
    .brand-name { font-family: 'Noto Serif SC', Georgia, serif; font-size: 1.4rem; font-weight: 900; color: var(--gold); letter-spacing: 0.1em; display: block; }
    .brand-sub  { font-size: 0.72rem; color: var(--ink-muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 5px; display: block; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 50px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-md);
      padding: 0 18px; color: var(--ink);
      font-family: inherit; font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--ink-faint); }
    .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    .login-btn {
      width: 100%; height: 52px; margin-top: 8px;
      background: linear-gradient(135deg, #233A2F, #18261E);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius-full);
      color: var(--gold); font-family: inherit;
      font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.08em; cursor: pointer;
      transition: all 0.2s var(--ease-out);
      box-shadow: 0 4px 16px rgba(212,175,55,0.15);
    }
    .login-btn:hover { background: linear-gradient(135deg, #2a4536, #1e3026); box-shadow: 0 6px 24px rgba(212,175,55,0.28); transform: translateY(-1px); }
    .login-btn:active { transform: scale(0.97) translateY(0); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg { color: #ff8888; font-size: 0.78rem; margin-top: 10px; text-align: center; min-height: 1.2em; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: var(--ink-muted); font-size: 0.78rem; text-decoration: none; }
    .back-link:hover { color: var(--ink); }
    .toast {
      position: fixed; top: 60px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.80); backdrop-filter: blur(8px);
      color: var(--ink); padding: 10px 22px;
      border-radius: 9999px; font-size: 0.82rem; z-index: 999;
      pointer-events: none; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toastIn 0.25s var(--ease-out) both;
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .toast.fade-out { animation: toastOut 0.3s ease both; }
    @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-8px)} }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">🀄</div>
      <span class="brand-name">温州麻将</span>
      <span class="brand-sub">后台管理系统</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="username">管理员账号</label>
      <input type="text" class="form-input" id="username" placeholder="请输入账号" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">密码</label>
      <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="login-btn">登录</button>
    <div class="error-msg" id="error-msg"></div>
    <a class="back-link" href="login.html">← 返回游戏大厅</a>
  </div>

  <script type="module">
    import { login, isAuthenticated } from "./js/admin-auth.js";

    // Already logged in → go to dashboard
    if (isAuthenticated()) {
      window.location.href = "admin-dashboard.html";
    }

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("login-btn");
    const errorMsg = document.getElementById("error-msg");

    function showToast(msg) {
      const old = document.getElementById("toast");
      if (old) old.remove();
      const t = document.createElement("div");
      t.id = "toast"; t.className = "toast"; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.classList.add("fade-out"); setTimeout(() => t.remove(), 300); }, 2000);
    }

    loginBtn.addEventListener("click", async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        errorMsg.textContent = "请输入账号和密码";
        return;
      }
      errorMsg.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "登录中…";
      const result = await login(username, password);
      loginBtn.disabled = false;
      loginBtn.textContent = "登录";
      if (result.ok) {
        showToast("登录成功");
        setTimeout(() => { window.location.href = "admin-dashboard.html"; }, 600);
      } else {
        errorMsg.textContent = result.error;
      }
    });

    passwordInput.addEventListener("keydown", e => { if (e.key === "Enter") loginBtn.click(); });
    usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") passwordInput.focus(); });
  </script>
</body>
</html>
